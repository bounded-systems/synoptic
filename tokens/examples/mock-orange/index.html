<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mock site — styled only by the token engine</title>
  <!-- NO CSS on the page. The engine generates style.css from the derived tokens. -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Colors Are Coordinates</h1>
  <p>Body copy on the surface, with a <a href="#">link</a> that clears AAA. The measure caps the line length near sixty-six characters so it stays readable.</p>
  <h2>A dark surface</h2>
  <article class="card">
    <h3>Card title</h3>
    <p>Light text on a dark surface, a border at two pixels, everything in rem.</p>
    <button type="button">Action</button>
  </article>
  <small>Fine print at the readability floor.</small>
</body>
</html>
