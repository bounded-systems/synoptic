name: site-ci
# THE site CI, implemented once. A site calls this and configures via
# synoptic.config.json. Builds the site and runs every declared gate from the pinned
# kit. NO signing here — routine checks are derivable and re-prove themselves; only
# axioms sign (at the authorization gate), and the deploy attests the whole build.
# So this needs only `contents: read`.
on:
  workflow_call:
    inputs:
      synoptic-ref:   { type: string, default: "v0.5.1" }
      kit-ref:        { type: string, default: "v0.12.0" }
      build-command:  { type: string, default: "npm run build" }
      node-version:   { type: string, default: "22" }
      browser:        { type: boolean, default: false }
      browser-gates:  { type: string, default: "axe-gate.mjs" }
jobs:
  site:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: bounded-systems/synoptic, ref: "${{ inputs.synoptic-ref }}", path: .synoptic, persist-credentials: false }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: bounded-systems/conformance-kit, ref: "${{ inputs.kit-ref }}", path: .conformance-kit, persist-credentials: false }
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: "${{ inputs.node-version }}" }
      - run: npm ci
      - run: npm --prefix .conformance-kit ci --omit=dev || npm --prefix .conformance-kit install --omit=dev
      - run: ${{ inputs.build-command }}
      - run: node .synoptic/generators/gen-prose-corpus.mjs
      - name: validate (all declared gates)
        run: CK_GATES="$PWD/.conformance-kit/gates" node .synoptic/validate.mjs

  browser:
    if: ${{ inputs.browser }}
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: bounded-systems/conformance-kit, ref: "${{ inputs.kit-ref }}", path: .conformance-kit, persist-credentials: false }
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: "${{ inputs.node-version }}" }
      - run: npm ci
      - run: npm --prefix .conformance-kit ci --omit=dev || npm --prefix .conformance-kit install --omit=dev
      - run: ${{ inputs.build-command }}
      - uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v12
      - name: browser gates on WebKit (tezcatl)
        run: for g in ${{ inputs.browser-gates }}; do AXE_RUNNER=tezcatl nix shell github:bdelanghe/tezcatl-flake -c node ".conformance-kit/gates/$g" dist; done
