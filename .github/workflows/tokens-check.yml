name: tokens

on:
  push:
    paths: ["tokens/**"]
  pull_request:
    paths: ["tokens/**"]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tokens
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed
        with:
          deno-version: v2.x
      - name: typecheck
        run: deno check *.ts
      # The gate RE-DERIVES from each brand config and asserts the committed style.css + token JSON
      # are byte-identical, then runs the full-indirection audit + CVD-hue scan. A hand-edit to any
      # generated file fails here — the derivation can't be circumvented.
      - name: gate — burnt-orange
        run: deno run --allow-read --allow-write --allow-run check.ts brands/burnt-orange/brand.json examples/mock-orange
      - name: gate — deep-blue
        run: deno run --allow-read --allow-write --allow-run check.ts brands/deep-blue/brand.json examples/mock-blue
